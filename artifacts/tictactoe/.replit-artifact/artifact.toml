kind = "web"
previewPath = "/"
title = "Tic Tac Toe"
version = "1.0.0"
id = "artifacts/tictactoe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20958

[services.development]
run = "pnpm --filter @workspace/tictactoe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tictactoe", "run", "build" ]
publicDir = "artifacts/tictactoe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20958"
BASE_PATH = "/"
