<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe - Play</title>
        <link rel="stylesheet" href="style.css" />

        <style>
            .game-container {
                text-align: center;
                margin-top: 50px;
            }

            .board {
                display: grid;
                grid-template-columns: repeat(3, 100px);
                grid-gap: 10px;
                margin: 20px auto;
                width: 320px;
            }

            .cell {
                width: 100px;
                height: 100px;
                background: #f0f0f0;
                border: 2px solid #333;
                font-size: 2.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }

            .cell:hover {
                background: #e0e0e0;
            }

            .cell.taken {
                cursor: not-allowed;
            }

            #status {
                margin: 20px;
                font-weight: bold;
                font-size: 1.2rem;
            }

            #ai-comment {
                font-style: italic;
                color: #555;
                min-height: 1.5em;
                margin-bottom: 10px;
            }

            #game-settings {
                background: #f9f9f9;
                padding: 15px;
                border-radius: 8px;
                display: inline-block;
                margin-bottom: 20px;
            }

            #ai-options {
                margin-left: 15px;
                padding-left: 15px;
                border-left: 2px solid #ccc;
            }
            
            select {
                padding: 5px;
                margin: 0 10px;
            }
        </style>
    </head>

    <body>
        <nav>
            <a href="dashboard.html">Dashboard</a> |
            <a href="leaderboard.html">Leaderboard</a> |
            <a href="/logout">Logout</a>
        </nav>

        <div class="game-container">
            <h1>Tic Tac Toe</h1>

            <div id="game-settings">
                <label><strong>Mode:</strong></label>
                <select id="game-mode" onchange="toggleAiSettings()">
                    <option value="pvp">Human vs Human</option>
                    <option value="pva">Human vs AI</option>
                </select>

                <span id="ai-options" style="display: none;">
                    <label>Difficulty:</label>
                    <select id="ai-difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>

                    <label>Personality:</label>
                    <select id="ai-personality">
                        <option value="sassy">Sassy</option>
                        <option value="grumpy">Grumpy</option>
                        <option value="supportive">Supportive</option>
                    </select>
                </span>
            </div>

            <div id="status">Player X's Turn</div>

            <div id="ai-comment">Select "Human vs AI" to challenge the bot!</div>

            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <button onclick="resetGame()">Reset Game</button>
        </div>

        <script>
            let boardState = ["", "", "", "", "", "", "", "", ""];
            let currentPlayer = "X";
            let gameActive = true;

            const boardElement = document.getElementById("board");
            const statusElement = document.getElementById("status");
            const aiCommentEl = document.getElementById("ai-comment");

            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            // Toggle visibility of AI settings
            function toggleAiSettings() {
                const mode = document.getElementById("game-mode").value;
                const aiOptions = document.getElementById("ai-options");
                aiOptions.style.display = mode === "pva" ? "inline-block" : "none";
                
                if (mode === "pva") {
                    aiCommentEl.innerText = "AI is ready to play.";
                } else {
                    aiCommentEl.innerText = "";
                }
            }

            function handleCellClick(e) {
                const clickedCell = e.target;
                if (!clickedCell.classList.contains('cell')) return;

                const index = clickedCell.getAttribute("data-index");
                if (boardState[index] !== "" || !gameActive) return;

                makeMove(index);

                // Check for AI turn
                if (gameActive && document.getElementById("game-mode").value === "pva" && currentPlayer === "O") {
                    setTimeout(aiMove, 600);
                }
            }

            function makeMove(index) {
                boardState[index] = currentPlayer;
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.innerText = currentPlayer;
                cell.classList.add("taken");

                checkResult();
            }

            function checkResult() {
                let roundWon = false;
                for (let condition of winningConditions) {
                    let a = boardState[condition[0]];
                    let b = boardState[condition[1]];
                    let c = boardState[condition[2]];
                    if (a === "" || b === "" || c === "") continue;
                    if (a === b && b === c) {
                        roundWon = true;
                        break;
                    }
                }

                if (roundWon) {
                    statusElement.innerText = `Player ${currentPlayer} Wins!`;
                    gameActive = false;
                    saveGame();
                    return;
                }

                if (!boardState.includes("")) {
                    statusElement.innerText = "It's a Draw!";
                    gameActive = false;
                    saveGame();
                    return;
                }

                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusElement.innerText = `Player ${currentPlayer}'s Turn`;
            }

            async function aiMove() {
                aiCommentEl.innerText = "AI is thinking...";

                try {
                    const res = await fetch("/api/ai", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            board: boardState,
                            difficulty: document.getElementById("ai-difficulty").value,
                            personality: document.getElementById("ai-personality").value,
                        }),
                    });

                    const data = await res.json();
                    aiCommentEl.innerText = data.comment || "";

                    if (typeof data.move === "number" && boardState[data.move] === "") {
                        makeMove(data.move);
                    }
                } catch (err) {
                    console.error(err);
                    aiCommentEl.innerText = "AI is feeling shy (error).";
                }
            }

            async function saveGame() {
                const payload = {
                    board: boardState,
                    winner: currentPlayer,
                    mode: document.getElementById("game-mode").value,
                    difficulty: document.getElementById("ai-difficulty").value,
                    personality: document.getElementById("ai-personality").value
                };
                console.log("Saving game data...", payload);
                // fetch('/save-game', { method: 'POST', body: JSON.stringify(payload) });
            }

            function resetGame() {
                boardState = ["", "", "", "", "", "", "", "", ""];
                gameActive = true;
                currentPlayer = "X";
                statusElement.innerText = "Player X's Turn";
                aiCommentEl.innerText = document.getElementById("game-mode").value === "pva" ? "AI is ready." : "";

                document.querySelectorAll(".cell").forEach((cell) => {
                    cell.innerText = "";
                    cell.classList.remove("taken");
                });
            }

            boardElement.addEventListener("click", handleCellClick);
        </script>
    </body>
</html>
