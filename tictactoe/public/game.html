<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe - Play</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-gap: 10px;
            margin: 20px 0;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #f0f0f0;
            border: 2px solid #333;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .cell.taken { cursor: not-allowed; }
        #status { font-weight: bold; margin: 10px 0; }
        #ai-comment { 
            font-style: italic; 
            color: #555; 
            margin: 10px 0; 
            min-height: 1.2em;
            word-break: break-all; 
        }
        nav { margin-bottom: 20px; }
        .auth-message {
            padding: 20px;
            background: #ffebee;
            border: 1px solid #f44336;
            color: #d32f2f;
            text-align: center;
            margin: 20px 0;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="dashboard.html">Dashboard</a> |
        <a href="leaderboard.html">Leaderboard</a> |
        <a href="/logout">Logout</a>
    </nav>

    <h1>!Tic Tac Toe!</h1>

    <div id="auth-check" class="auth-message" style="display: none;">
        Please <a href="login.html">login</a> to play.
    </div>

    <div id="game-content" style="display: none;">
        <div id="game-settings">
            <label>Mode:</label>
            <select id="game-mode" onchange="toggleAiSettings()">
                <option value="pvp">Human vs Human</option>
                <option value="pva">Human vs AI</option>
            </select>

            <span id="ai-options" style="display: none;">
                <label>Difficulty:</label>
                <select id="ai-difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="impossible" selected>Impossible</option>
                </select>

                <label>Personality:</label>
                <select id="ai-personality">
                    <option value="sassy">Sassy</option>
                    <option value="grumpy">Grumpy</option>
                    <option value="supportive">Supportive</option>
                    <option value="chaos">HY@RG*RG#*</option>
                </select>
            </span>
        </div>

        <div id="status">Player X's Turn</div>
        <div id="ai-comment"></div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        let boardState = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;

        const boardElement = document.getElementById("board");
        const statusElement = document.getElementById("status");
        const aiCommentEl = document.getElementById("ai-comment");
        const gameContent = document.getElementById("game-content");
        const authCheck = document.getElementById("auth-check");

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // Check authentication on page load
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth', { credentials: 'include' });
                const data = await response.json();
                
                if (data.loggedIn) {
                    authCheck.style.display = 'none';
                    gameContent.style.display = 'block';
                    initializeGame();
                } else {
                    authCheck.style.display = 'block';
                    gameContent.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (err) {
                authCheck.style.display = 'block';
                gameContent.style.display = 'none';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        }

        function initializeGame() {
            // Toggle AI settings visibility
            function toggleAiSettings() {
                const mode = document.getElementById("game-mode").value;
                document.getElementById("ai-options").style.display = (mode === "pva") ? "inline" : "none";
            }

            // Core win checking logic
            function checkWinnerRaw(board) {
                for (let i = 0; i < winningConditions.length; i++) {
                    const [a, b, c] = winningConditions[i];
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return board[a];
                    }
                }
                if (!board.includes("")) return "tie";
                return null;
            }

            // Placeholder for saving game stats
            function saveGame(result) {
                console.log("Saving game data. Result: " + result);
            }

            // Handle user clicks on the board
            function handleCellClick(e) {
                const clickedCell = e.target;
                if (!clickedCell.classList.contains('cell')) return;
                const index = clickedCell.getAttribute("data-index");

                if (boardState[index] !== "" || !gameActive) return;

                makeMove(index);

                if (gameActive && document.getElementById("game-mode").value === "pva" && currentPlayer === "O") {
                    boardElement.style.pointerEvents = "none";
                    setTimeout(aiMove, 500);
                }
            }

            function makeMove(index) {
                boardState[index] = currentPlayer;
                const cell = document.querySelector('[data-index="' + index + '"]');
                cell.innerText = currentPlayer;
                cell.classList.add("taken");
                checkResult();
            }

            function checkResult() {
                let winner = checkWinnerRaw(boardState);
                if (winner && winner !== "tie") {
                    statusElement.innerText = "Player " + currentPlayer + " Wins!";
                    gameActive = false;
                    saveGame(currentPlayer);
                    return;
                }
                if (!boardState.includes("")) {
                    statusElement.innerText = "It's a Draw!";
                    gameActive = false;
                    saveGame("draw");
                    return;
                }
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusElement.innerText = "Player " + currentPlayer + "'s Turn";
            }

            // Fetch AI move from backend
            async function aiMove() {
                const difficulty = document.getElementById("ai-difficulty").value;
                const personality = document.getElementById("ai-personality").value;
                aiCommentEl.innerText = "...";

                let suggestedMove;
                if (difficulty === "impossible") {
                    suggestedMove = getBestMove(boardState);
                }

                try {
                    const requestBody = {
                        board: boardState,
                        difficulty: difficulty,
                        personality: personality,
                    };
                    if (suggestedMove !== undefined) {
                        requestBody.suggestedMove = suggestedMove;
                    }

                    const res = await fetch("/api/ai", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(requestBody),
                        credentials: 'include'
                    });
                    const data = await res.json();
                    
                    aiCommentEl.innerText = data.comment || "";
                    const finalMove = data.move;

                    if (typeof finalMove === "number" && boardState[finalMove] === "") {
                        makeMove(finalMove);
                    }
                } catch (err) {
                    aiCommentEl.innerText = "AI Offline.";
                } finally {
                    boardElement.style.pointerEvents = "auto";
                }
            }

            // Minimax Algorithm entry point
            function getBestMove(board) {
                let bestScore = -Infinity;
                let move;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "O";
                        let score = minimax(board, 0, false);
                        board[i] = "";
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                }
                return move;
            }

            // Recursive Minimax Algorithm
            const scores = { X: -10, O: 10, tie: 0 };
            function minimax(board, depth, isMaximizing) {
                let result = checkWinnerRaw(board);
                if (result !== null) return scores[result];
                
                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === "") {
                            board[i] = "O";
                            let score = minimax(board, depth + 1, false);
                            board[i] = "";
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === "") {
                            board[i] = "X";
                            let score = minimax(board, depth + 1, true);
                            board[i] = "";
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }

            // Reset the game board
            function resetGame() {
                boardState = ["", "", "", "", "", "", "", "", ""];
                currentPlayer = "X";
                gameActive = true;
                statusElement.innerText = "Player X's Turn";
                aiCommentEl.innerText = "";
                document.querySelectorAll('.cell').forEach(function(cell) {
                    cell.innerText = "";
                    cell.classList.remove("taken");
                });
                boardElement.style.pointerEvents = "auto";

                document.getElementById("game-mode").value = "pvp";
                document.getElementById("ai-difficulty").value = "impossible";
                document.getElementById("ai-personality").value = "sassy";
                toggleAiSettings();
            }

            // Attach click listener to the board wrapper
            boardElement.addEventListener('click', handleCellClick);
            toggleAiSettings();
        }

        // Check auth when page loads
        checkAuth();
    </script>
</body>
</html>
