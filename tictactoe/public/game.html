<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe - Play</title>
        <style>
            .board {
                display: grid;
                grid-template-columns: repeat(3, 100px);
                grid-gap: 10px;
                margin: 20px 0;
            }
            .cell {
                width: 100px;
                height: 100px;
                background: #f0f0f0;
                border: 2px solid #333;
                font-size: 2.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }
            .cell.taken { cursor: not-allowed; }
            #status { font-weight: bold; margin: 10px 0; }
            #ai-comment { font-style: italic; color: #555; margin: 10px 0; }
        </style>
    </head>

    <body>
        <nav>
            <a href="dashboard.html">Dashboard</a> |
            <a href="leaderboard.html">Leaderboard</a> |
            <a href="/logout">Logout</a>
        </nav>

        <h1>Tic Tac Toe</h1>

        <div id="game-settings">
            <label>Mode:</label>
            <select id="game-mode" onchange="toggleAiSettings()">
                <option value="pvp">Human vs Human</option>
                <option value="pva">Human vs AI</option>
            </select>

            <span id="ai-options" style="display: none;">
                <label>Difficulty:</label>
                <select id="ai-difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="impossible" selected>Impossible</option>
                </select>

                <label>Personality:</label>
                <select id="ai-personality">
                    <option value="sassy">Sassy</option>
                    <option value="grumpy">Grumpy</option>
                    <option value="supportive">Supportive</option>
                </select>
            </span>
        </div>

        <div id="status">Player X's Turn</div>
        <div id="ai-comment"></div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button onclick="resetGame()">Reset Game</button>

        <script>
            let boardState = ["", "", "", "", "", "", "", "", ""];
            let currentPlayer = "X";
            let gameActive = true;

            const boardElement = document.getElementById("board");
            const statusElement = document.getElementById("status");
            const aiCommentEl = document.getElementById("ai-comment");

            const winningConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            function toggleAiSettings() {
                const mode = document.getElementById("game-mode").value;
                document.getElementById("ai-options").style.display = (mode === "pva") ? "inline" : "none";
            }

            function handleCellClick(e) {
                const clickedCell = e.target;
                if (!clickedCell.classList.contains('cell')) return;
                const index = clickedCell.getAttribute("data-index");

                if (boardState[index] !== "" || !gameActive) return;

                makeMove(index);

                if (gameActive && document.getElementById("game-mode").value === "pva" && currentPlayer === "O") {
                    setTimeout(aiMove, 500);
                }
            }

            function makeMove(index) {
                boardState[index] = currentPlayer;
                document.querySelector(`[data-index="${index}"]`).innerText = currentPlayer;
                document.querySelector(`[data-index="${index}"]`).classList.add("taken");
                checkResult();
            }

            function checkResult() {
                let winner = checkWinnerRaw(boardState);
                if (winner && winner !== "tie") {
                    statusElement.innerText = `Player ${currentPlayer} Wins!`;
                    gameActive = false;
                    saveGame(currentPlayer);
                    return;
                }
                if (!boardState.includes("")) {
                    statusElement.innerText = "It's a Draw!";
                    gameActive = false;
                    saveGame("draw");
                    return;
                }
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusElement.innerText = `Player ${currentPlayer}'s Turn`;
            }

            async function aiMove() {
                const difficulty = document.getElementById("ai-difficulty").value;
                const personality = document.getElementById("ai-personality").value;
                aiCommentEl.innerText = "Thinking...";

                let move;
                if (difficulty === "impossible") {
                    move = getBestMove(boardState);
                }

                try {
                    const res = await fetch("/api/ai", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            board: boardState,
                            difficulty,
                            personality,
                            suggestedMove: move
                        }),
                    });
                    const data = await res.json();
                    aiCommentEl.innerText = data.comment || "";
                    const finalMove = (difficulty === "impossible") ? move : data.move;

                    if (typeof finalMove === "number" && boardState[finalMove] === "") {
                        makeMove(finalMove);
                    }
                } catch (err) {
                    aiCommentEl.innerText = "AI Error.";
                }
            }

            // Minimax Algorithm
            function getBestMove(board) {
                let bestScore = -Infinity;
                let move;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "O";
                        let score = minimax(board, 0, false);
                        board[i] = "";
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                }
                return move;
            }

            const scores = { X: -10, O: 10, tie: 0 };
            function minimax(board, depth, isMaximizing) {
                let result = checkWinnerRaw(board);
                if (result !== null) return scores[result];
                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === "") {
                            board[i] = "O";
                            let score = minimax(board, depth + 1, false);
                            board[i] = "";
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === "") {
                            board[i] = "X";
                            let score = minimax(board, depth + 1, true);
                            board[i] = "";
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }

            function checkWinnerRaw(board) {
                for (let condition of winningConditions) {
                    const [a, b, c] = condition;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
                }
                return board.includes("") ? null : "tie";
            }

            async function saveGame(winner) {
                const mode = document.getElementById("game-mode").value;
                const payload = {
                    board: boardState,
                    winner,
                    mode,
                    difficulty: mode === "pva" ? document.getElementById("ai-difficulty").value : null,
                    personality: mode === "pva" ? document.getElementById("ai-personality").value : null,
                    username: localStorage.getItem("username") || null,
                };
                try {
                    const res = await fetch("/api/games/save", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });
                    const data = await res.json();
                    if (!data.success) console.error("Save failed:", data.message);
                    else console.log("Game saved:", data.game.id);
                } catch (err) {
                    console.error("Save network error:", err);
                }
            }

            function resetGame() {
                boardState = ["", "", "", "", "", "", "", "", ""];
                gameActive = true;
                currentPlayer = "X";
                statusElement.innerText = "Player X's Turn";
                aiCommentEl.innerText = "";
                document.querySelectorAll(".cell").forEach(c => c.innerText = "");
            }

            boardElement.addEventListener("click", handleCellClick);
        </script>
    </body>
</html>
